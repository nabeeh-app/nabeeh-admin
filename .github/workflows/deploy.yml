name: Deploy Admin to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa exe.dev >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy nabeeh-admin
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'cd /home/exedev/nabeeh-admin && git pull origin main && docker compose -f docker-compose.prod.yml build --no-cache && docker compose -f docker-compose.prod.yml up -d'"

      - name: Verify container
        run: |
          sleep 15
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no exe.dev \
            "ssh tagooza 'docker ps --format \"table {{.Names}}\t{{.Status}}\"'"

      - name: Health check
        run: |
          sleep 5
          curl -sf https://admin.nabeeh.app/ -o /dev/null -w "%{http_code}" || echo "Admin health check failed"
